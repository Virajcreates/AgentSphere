name: CI

on: [push, pull_request]

jobs:
  quality:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: agentsphere_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Lint with Ruff
        run: uv run ruff check src/

      - name: Type check with mypy
        run: uv run mypy --strict src/

      - name: Security scan with Bandit
        run: uv run bandit -r src/

      - name: Vulnerability audit
        run: uv run pip-audit

      - name: Secret scan
        run: uv run detect-secrets scan

      - name: Unit tests with coverage
        run: uv run pytest tests/unit -v --cov=src --cov-fail-under=80

      - name: Integration tests
        run: uv run pytest tests/integration -v
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/agentsphere_test
          DATABASE_URL_SYNC: postgresql://postgres:postgres@localhost:5432/agentsphere_test
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET: ci-test-secret-that-is-at-least-32-characters-long
